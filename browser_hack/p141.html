<script>
  // saitolab
  var url = "https://www.saitolab.org/picture/europe/i1.jpg";
  var loaded = false;
  var img = new Image();
  var start = new Date().getTime();
  img.src = url;
  var now = new Date().getTime();
  if (img.complete) {
    delete img;
    console.log("visited");
  } else if (now - start > 10) {
    // imgオブジェクトのプロパティを削除
    delete img;
    // 読み込みの中止
    window.stop();
    console.log("not visited");
  }else{
    console.log("not visited");
  } 
</script>
