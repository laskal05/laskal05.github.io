<!DOCTYPE html>
<html>
  <head>
    <title>文字列一致率検証サイト(改行あり)</title>
    <link type="text/css" rel="stylesheet" href="css/bootstrap.min.css">
    <link type="text/css" rel="stylesheet" href="css/bootstrap-theme.min.css">
    <link type="text/css" rel="stylesheet" href="css/word_compare.css">
  </head>
  <body>
    <div class="container">
      <h2>Source内の要素から，Exception内の要素を除くページ(改行あり)</h2>
      <hr>
      <div class="row">
        <div class="col-md-4">
          <label>Source</label><br>
          <textarea id="source"></textarea>
        </div>
        <div class="col-md-4">
          <label>Exception</label><br>
          <textarea id="exception"></textarea>
        </div>
        <div class="col-md-4">
          <button id="get_value">Get!</button>
          <table id="tables" class="table table-border table-striped">
            <thead>
              <tr>
                <th>Key</th><th>Value</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Number of Common Word</td>
                <td id="res_num"></td>
              </tr>
              <tr>
                <td>Cooncordance Rate</td>
                <td id="res_rate"></td>
              </tr>
              <tr>
                <td>Cooncordance Word</td>
                <td id="res_word"></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <script type="text/javascript" src="js/jquery-1.12.0.min.js"></script>
    <script type="text/javascript" src="js/bootstrap.min.js"></script>
    <script type="text/javascript" src="js/word_compare.js"></script>
  </body>
</html>
